name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Type-check & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      # Hard-fails when any in-scope file drops below the per-file coverage
      # thresholds in vitest.config.mts, flagging untested code on the PR.
      - name: Test with coverage
        run: npm run coverage

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
