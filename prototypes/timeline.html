<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mooserific — Timeline prototype (15-year archive)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Sacramento&display=swap" rel="stylesheet" />
<style>
  /* ── Design tokens (design-system.md) ────────────────────────────── */
  :root {
    --bg: #f9fafb;
    --surface: #ffffff;
    --text: #111827;
    --accent: #845A2C;        /* umber */
    --accent-muted: #A87941;  /* year text only */
    --accent-wash: rgba(132, 90, 44, 0.06);
    --accent-hairline: rgba(132, 90, 44, 0.15);
    --rail: 80px;             /* bottom bar height / right rail width */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  /* landscape reserves room at the foot so the last post clears the bottom bar */
  body.landscape { padding-bottom: calc(var(--rail) + 28px); }
  /* vertical: no reserved column — photos run full-bleed and the glass rail floats on top */
  body.portrait  { padding-right: 0; }

  /* ── Header ──────────────────────────────────────────────────────── */
  header.site {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; pointer-events: none;
    background: linear-gradient(to bottom, rgba(249,250,251,0.85), rgba(249,250,251,0));
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  }
  /* header runs full width (scrim over photos); only its button is padded
     clear of the floating rail so it stays clickable */
  body.portrait header.site { padding-right: calc(var(--rail) + 22px); }
  .site-title {
    font-family: 'Sacramento', cursive; font-size: 32px; line-height: 1;
    color: var(--accent); pointer-events: auto;
    text-shadow: 0 1px 8px rgba(249,250,251,0.9);
  }
  .ghost-btn {
    pointer-events: auto; background: transparent; border: 1px solid transparent;
    color: var(--accent); border-radius: 10px; padding: 8px 18px;
    font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 120ms ease; text-shadow: 0 1px 8px rgba(249,250,251,0.9);
  }
  .ghost-btn:hover { background: var(--accent-wash); }

  /* ── Feed ────────────────────────────────────────────────────────── */
  .post { position: relative; }

  /* Date divider — same ghost-numeral signature, but lighter now that
     the timeline shares wayfinding (backlog #1: keep it, demote it). */
  .divider {
    position: relative; overflow: hidden;
    max-width: 1180px; margin: 0 auto; padding: 104px 32px 32px;
  }
  .post:first-child .divider { padding-top: 132px; }
  .date-giant {
    font-weight: 900; font-size: 190px; line-height: 0.78; letter-spacing: -0.05em;
    color: rgba(0,0,0,0.035);                 /* a touch fainter than before */
    position: absolute; right: -12px; top: 14px;
    user-select: none; pointer-events: none; z-index: 0;
  }
  .date-overlay { position: relative; z-index: 1; }
  .date-overlay .month {
    font-weight: 700; font-size: 13px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent);
  }
  .date-overlay .year { font-weight: 300; font-size: 12px; color: var(--accent-muted); margin-top: 3px; }
  .caption {
    position: relative; z-index: 1; font-size: 21px; font-weight: 400;
    line-height: 1.4; max-width: 38ch; margin-top: 20px; color: var(--text);
  }
  .author { position: relative; z-index: 1; font-size: 13px; color: var(--accent); margin-top: 10px; }
  .author strong { font-weight: 700; }

  /* photography breathes (backlog #2) */
  .hero {
    display: block; width: 100%; height: 88vh; object-fit: cover;
    background: linear-gradient(135deg, #e7e2da, #d8cfc2);
  }
  .frames { max-width: 1180px; margin: 14px auto 0; padding: 0 14px; display: grid; gap: 14px; }
  .frames img { width: 100%; border-radius: 12px; display: block; object-fit: cover;
    background: linear-gradient(135deg, #e7e2da, #d8cfc2); }
  .frames img.tall { aspect-ratio: 3 / 2; }
  .frames .two-up { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .frames .two-up img { aspect-ratio: 4 / 5; }
  .feed-end { text-align: center; color: var(--accent); font-size: 14px; padding: 72px 0 64px; }

  /* ── Scrubber shell ──────────────────────────────────────────────── */
  .scrubber {
    position: fixed; z-index: 50;
    /* floating "liquid glass" panel: translucent + blur + rounded all corners */
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(16px) saturate(1.4); -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 18px;   /* between image (12) and card (20) so it reads as its own floating control */
    box-shadow: 0 8px 30px -6px rgba(0,0,0,0.18);
  }
  /* centered + capped so it's ALWAYS narrower than the photo column (~1152px
     of content); the 96px inset keeps it clear of the photo edges when narrow */
  body.landscape .scrubber {
    left: 50%; transform: translateX(-50%);
    width: min(100% - 96px, 1080px);
    bottom: 14px; height: var(--rail);
  }
  body.portrait  .scrubber { top: 14px; bottom: 14px; right: 14px; width: var(--rail); }
  .track { position: absolute; cursor: pointer; }
  body.landscape .track { left: 28px; right: 28px; top: 0; bottom: 0; }
  body.portrait  .track { top: 28px; bottom: 28px; left: 0; right: 0; }

  /* minimize toggle (ghost) — bottom-right of the timeline in BOTH orientations
     (the bottom end of the rail in vertical), so it lands where the collapsed
     pill's expand chevron will be — the control stays put under the cursor */
  .tl-toggle {
    position: absolute; z-index: 7; right: 4px; bottom: 4px;
    background: transparent; border: 1px solid transparent;
    color: var(--accent); border-radius: 8px; padding: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 120ms ease;
  }
  .tl-toggle:hover { background: var(--accent-wash); }

  /* collapsed read-only pill: just the playhead date + an expand chevron */
  .tl-mini {
    position: fixed; z-index: 50; bottom: 14px; right: 14px;
    display: none; align-items: center; gap: 8px; cursor: pointer;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(16px) saturate(1.4); -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.55); border-radius: 14px;
    box-shadow: 0 8px 30px -6px rgba(0,0,0,0.18);
    padding: 7px 10px 7px 14px; color: var(--accent);
  }
  .tl-mini:hover { background: rgba(255,255,255,0.8); }
  .tl-mini .d { font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  body.tl-collapsed .scrubber { display: none; }
  body.tl-collapsed .tl-mini { display: flex; }
  body.landscape.tl-collapsed { padding-bottom: 58px; }
  body.portrait.tl-collapsed  { padding-right: 0; padding-bottom: 58px; }

  /* density mark — one per month, positioned by frac, growing toward the feed */
  .bar { position: absolute; background: var(--accent); opacity: 0.16; border-radius: 1px; transition: opacity 200ms ease; }
  .bar.populated { opacity: 0.4; }
  .bar.active { opacity: 0.85 !important; }

  /* year ticks + labels */
  .tick { position: absolute; background: var(--accent-hairline); }
  .year-label {
    position: absolute; font-size: 11px; font-weight: 500; letter-spacing: 0.03em;
    color: var(--accent-muted); white-space: nowrap;
  }

  /* playhead — umber "you are here" marker with an arrow into the feed */
  .playhead { position: absolute; background: var(--accent); border-radius: 2px; transition: left 120ms ease, top 120ms ease, opacity 120ms ease; pointer-events: none; z-index: 2; }
  .ph-arrow { position: absolute; width: 0; height: 0; }
  .ph-label {
    position: absolute; font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--accent); white-space: nowrap;
    background: var(--surface); border: 1px solid var(--accent-hairline);
    border-radius: 8px; padding: 3px 8px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08);
    transition: opacity 120ms ease;
  }
  /* hover flag */
  .hover-flag {
    position: absolute; background: #ffffff; border: 1px solid rgba(132,90,44,0.3);
    border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--accent);
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 100ms ease;
    box-shadow: 0 6px 16px -3px rgba(0,0,0,0.22); z-index: 3;
  }
  .track:hover .hover-flag { opacity: 1; }

  /* keyboard cursor — wears the PRIMARY (filled) treatment, the same signal a
     form's submit button uses, to say "Enter commits this jump". Sits in front
     of the playhead, which recedes while you steer. */
  .kb-cursor { position: absolute; background: var(--accent); border-radius: 2px; z-index: 6; }
  #kbLabel { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 6px 16px -3px rgba(132,90,44,0.4); }
  /* focus ring sits on the floating panel (which already pads the timeline
     content) so it isn't crammed against the first/last year at either end */
  .track:focus { outline: none; }
  .scrubber:has(.track:focus-visible) { outline: 2px solid var(--accent); outline-offset: 3px; }

  @media (max-width: 640px) { .date-giant { font-size: 130px; } .caption { font-size: 18px; } .hero { height: 76vh; } .frames .two-up { grid-template-columns: 1fr; } }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } .playhead { transition: none; } }
</style>
</head>
<body>
<header class="site">
  <div class="site-title">Mooserific</div>
  <button class="ghost-btn">Sign in</button>
</header>

<main id="feed"></main>
<div class="feed-end">· the beginning, 2011 ·</div>

<nav class="scrubber" aria-label="Timeline" id="scrubber">
  <button class="tl-toggle" id="tlToggle" type="button" aria-label="Minimize timeline" title="Minimize timeline">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 6 8 10 12 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="track" id="track" tabindex="0" role="slider"
       aria-label="Jump to a point in time. Arrow keys move by month, hold Shift for years, Enter to go there.">
    <div class="hover-flag" id="hoverFlag"></div>
    <!-- density / ticks / labels injected by layout() -->
    <div class="kb-cursor" id="kbCursor" hidden>
      <div class="ph-label" id="kbLabel"></div>
    </div>
    <div class="playhead" id="playhead">
      <div class="ph-arrow" id="phArrow"></div>
      <div class="ph-label" id="phLabel"></div>
    </div>
  </div>
</nav>
<button class="tl-mini" id="tlMini" type="button" hidden aria-label="Expand timeline">
  <span class="d" id="tlMiniDate">—</span>
  <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 10 8 6 12 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<script>
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const fmtMonth = d => `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;

  // ── Generate a realistic 15-year archive (2011–2025) ──────────────
  // deterministic RNG so the density shape is stable across reloads
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  const rng = mulberry32(20110714);
  const START_YEAR = 2011, END_YEAR = 2025;
  const captions = [
    'Late summer at the lake — nobody wanted to come inside.',
    'Fourth of July on the back porch.', 'Christmas morning, still in pajamas at noon.',
    'Graduation day. How.', 'First day of school.', 'Beach week — the good kind of tired.',
    'The garden finally came in.', 'Thanksgiving, the whole crowd.',
    'Spring hike before the heat.', 'Snow day, no school.', 'Birthday number eight.',
    'Just a regular Tuesday, worth keeping.', 'The very beginning of this little archive.',
    'Apple picking, sticky hands.',
  ];
  const authors = ['vemoose', 'dadmoose'];

  // build ~ a couple hundred posts, clustered toward summer + December
  const allPosts = [];
  for (let y = START_YEAR; y <= END_YEAR; y++) {
    const n = 8 + Math.floor(rng() * 22);            // 8–29 posts/year
    for (let k = 0; k < n; k++) {
      // seasonal bias: pull months toward Jun–Aug and Dec
      let m = Math.floor(rng() * 12);
      if (rng() < 0.45) m = [5,6,7,11][Math.floor(rng()*4)];
      const day = 1 + Math.floor(rng() * 27);
      allPosts.push(new Date(y, m, day));
    }
  }
  allPosts.sort((a, b) => b - a);                     // newest first

  const spanStart = new Date(START_YEAR, 0, 1).getTime();
  const spanEnd   = new Date(END_YEAR + 1, 0, 1).getTime();
  const frac = t => (t - spanStart) / (spanEnd - spanStart);

  // ── Render a representative SAMPLE as full feed sections ───────────
  // (rendering all ~250 full-bleed posts would be needlessly heavy for a
  //  prototype; in production every post is a real scroll target.)
  const img = (seed, w, h) => `https://picsum.photos/seed/moose${seed}/${w}/${h}`;
  const feed = document.getElementById('feed');
  const sampleStep = Math.ceil(allPosts.length / 14);
  const sample = allPosts.filter((_, i) => i % sampleStep === 0);

  sample.forEach((d, i) => {
    const day = d.getDate();
    const nPhotos = 2 + Math.floor(rng() * 3);
    const section = document.createElement('section');
    section.className = 'post';
    section.dataset.frac = frac(d.getTime());
    section.dataset.label = fmtMonth(d);

    let framesHTML = '';
    const extra = nPhotos - 1;
    if (extra > 0) {
      let parts = '', n = 0;
      while (n < extra) {
        if (extra - n >= 2 && n % 2 === 1) {
          parts += `<div class="two-up"><img loading="lazy" src="${img(`${i}-${n}`,800,1000)}" alt=""><img loading="lazy" src="${img(`${i}-${n+1}`,800,1000)}" alt=""></div>`;
          n += 2;
        } else { parts += `<img class="tall" loading="lazy" src="${img(`${i}-${n}`,1400,933)}" alt="">`; n += 1; }
      }
      framesHTML = `<div class="frames">${parts}</div>`;
    }
    section.innerHTML = `
      <div class="divider">
        <div class="date-giant">${day}</div>
        <div class="date-overlay">
          <time datetime="${d.toISOString().slice(0,10)}">
            <div class="month">${MONTHS[d.getMonth()]} ${day}</div>
            <div class="year">${d.getFullYear()}</div>
          </time>
        </div>
        <p class="caption">${captions[i % captions.length]}</p>
        <p class="author">by <strong>${authors[i % 2]}</strong></p>
      </div>
      <img class="hero" loading="${i === 0 ? 'eager' : 'lazy'}" src="${img(`${i}-hero`,1800,1100)}" alt="">
      ${framesHTML}`;
    feed.appendChild(section);
  });
  const sections = [...document.querySelectorAll('.post')];

  // ── Month density (from ALL posts, the full 15-yr shape) ───────────
  const totalMonths = (END_YEAR - START_YEAR + 1) * 12;
  const counts = new Array(totalMonths).fill(0);
  allPosts.forEach(d => { counts[(d.getFullYear()-START_YEAR)*12 + d.getMonth()]++; });
  const maxCount = Math.max(...counts, 1);

  // ── Orientation-aware layout ───────────────────────────────────────
  const track = document.getElementById('track');
  const playhead = document.getElementById('playhead');
  const phArrow = document.getElementById('phArrow');
  const phLabel = document.getElementById('phLabel');
  const hoverFlag = document.getElementById('hoverFlag');
  const kbCursor = document.getElementById('kbCursor');
  const kbLabel = document.getElementById('kbLabel');
  const tlToggle = document.getElementById('tlToggle');
  const tlMini = document.getElementById('tlMini');
  const tlMiniDate = document.getElementById('tlMiniDate');
  let isPortrait = null;
  let bars = [];
  let cursorMonth = 0;   // keyboard cursor position, in months since START_YEAR
  let cursorDetached = false;   // true only while the user is steering the cursor by keyboard

  // place an element along the time axis (left% in landscape, top% in portrait).
  // newest sits at right (landscape) / top (portrait) — consistent under a
  // clockwise quarter-turn, and the playhead tracks scroll the same way in both.
  function axisPos(f) { return isPortrait ? (1 - f) * 100 : f * 100; }

  function layout() {
    const portrait = window.innerHeight > window.innerWidth;
    if (portrait === isPortrait) return;
    isPortrait = portrait;
    document.body.className = portrait ? 'portrait' : 'landscape';

    // wipe injected pieces (keep playhead + hoverFlag)
    track.querySelectorAll('.bar, .tick, .year-label').forEach(el => el.remove());
    hoverFlag.style.cssText = '';   // drop stale positioning from the old orientation
    bars = [];

    // density bars — fixed 3px "thickness" along the time axis, length
    // (perpendicular, toward the feed) scales with the month's post count.
    for (let m = 0; m < totalMonths; m++) {
      const bar = document.createElement('div');
      bar.className = 'bar' + (counts[m] ? ' populated' : '');
      const f = (m + 0.5) / totalMonths;
      const len = counts[m] ? 22 + (counts[m] / maxCount) * 70 : 8;  // % → px below
      if (portrait) {
        bar.style.top = `calc(${axisPos(f)}% - 1.5px)`;
        bar.style.right = '14px';
        bar.style.height = '3px';
        bar.style.width = `${len * 0.42}px`;
      } else {
        bar.style.left = `calc(${axisPos(f)}% - 1.5px)`;
        bar.style.bottom = '26px';
        bar.style.width = '3px';
        bar.style.height = `${len * 0.42}px`;
      }
      track.appendChild(bar);
      bars.push({ el: bar, month: m });
    }

    // year ticks + labels
    for (let y = START_YEAR; y <= END_YEAR; y++) {
      const mid = frac(new Date(y, 6, 1).getTime());
      const label = document.createElement('div');
      label.className = 'year-label';
      // 15 labels fit on desktop; show every-other when cramped
      label.textContent = `’${String(y).slice(2)}`;
      if (portrait) { label.style.top = `calc(${axisPos(mid)}% - 7px)`; label.style.left = '10px'; }
      else { label.style.left = `${axisPos(mid)}%`; label.style.transform = 'translateX(-50%)'; label.style.bottom = '4px'; }
      track.appendChild(label);
    }

    // playhead geometry differs per orientation
    if (portrait) {
      playhead.style.left = '8px'; playhead.style.right = '8px'; playhead.style.height = '2px';
      playhead.style.top = ''; playhead.style.bottom = '';
      phArrow.style.cssText = 'left:-2px;top:50%;transform:translateY(-50%);border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:8px solid var(--accent);';
      // label hangs off the left of the rail as a bookmark tab, clear of the bars
      phLabel.style.cssText = 'top:50%;left:-6px;transform:translate(-100%,-50%);';
    } else {
      playhead.style.top = '8px'; playhead.style.bottom = '20px'; playhead.style.width = '2px';
      playhead.style.left = ''; playhead.style.right = '';
      phArrow.style.cssText = 'top:-2px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--accent);';
      // label rides above the bar as a chip, clear of the photos behind it
      phLabel.style.cssText = 'top:-30px;left:50%;transform:translateX(-50%);';
    }

    // keyboard cursor mirrors the playhead geometry; chip reuses the same offsets
    track.setAttribute('aria-orientation', portrait ? 'vertical' : 'horizontal');
    if (portrait) {
      kbCursor.style.left = '8px'; kbCursor.style.right = '8px'; kbCursor.style.height = '2px';
      kbCursor.style.top = ''; kbCursor.style.bottom = '';
      kbLabel.style.cssText = 'top:50%;left:-6px;transform:translate(-100%,-50%);';
    } else {
      kbCursor.style.top = '8px'; kbCursor.style.bottom = '20px'; kbCursor.style.width = '2px';
      kbCursor.style.left = ''; kbCursor.style.right = '';
      kbLabel.style.cssText = 'top:-30px;left:50%;transform:translateX(-50%);';
    }
    if (cursorDetached) positionCursor();

    updatePlayhead();
  }

  // ── Keyboard navigation (accessible replacement for the date picker) ──
  const playheadMonth = () => Math.min(totalMonths - 1, Math.max(0, Math.round(activeFrac * totalMonths)));
  // The cursor normally rides WITH the playhead and stays hidden. It only
  // becomes its own visible marker once the user moves it by keyboard
  // ("detached"), and re-joins the playhead (hides) on Enter or blur.
  function positionCursor() {
    const f = (cursorMonth + 0.5) / totalMonths;
    if (isPortrait) kbCursor.style.top = `${axisPos(f)}%`; else kbCursor.style.left = `${axisPos(f)}%`;
    const d = new Date(START_YEAR + Math.floor(cursorMonth / 12), cursorMonth % 12, 1);
    const text = fmtMonth(d);
    kbLabel.textContent = text;
    track.setAttribute('aria-valuenow', cursorMonth);
    track.setAttribute('aria-valuetext', text);
    kbCursor.hidden = !cursorDetached;
    // while steering, the playhead recedes and drops its label so the only
    // chip you read is the cursor's
    phLabel.style.opacity = cursorDetached ? '0' : '1';
    playhead.style.opacity = cursorDetached ? '0.4' : '1';
  }
  function syncCursorToPlayhead() {
    if (cursorDetached) return;   // user is steering it — don't yank it back
    cursorMonth = playheadMonth();
    positionCursor();             // parks it on the playhead; stays hidden
  }
  const clampMonth = m => Math.min(totalMonths - 1, Math.max(0, m));
  function jumpToCursor() {
    const f = (cursorMonth + 0.5) / totalMonths;
    let nearest = sections[0], best = Infinity;
    for (const s of sections) { const dd = Math.abs(parseFloat(s.dataset.frac) - f); if (dd < best) { best = dd; nearest = s; } }
    nearest.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  track.addEventListener('focus', () => { cursorDetached = false; syncCursorToPlayhead(); });
  track.addEventListener('blur', () => { cursorDetached = false; positionCursor(); });
  track.addEventListener('keydown', e => {
    let delta = 0;
    // right/up = forward in time, left/down = back — true in both orientations
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') delta = e.shiftKey ? 12 : 1;
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') delta = e.shiftKey ? -12 : -1;
    else if (e.key === 'Home') { cursorDetached = true; cursorMonth = 0; }
    else if (e.key === 'End') { cursorDetached = true; cursorMonth = totalMonths - 1; }
    else if (e.key === 'Enter' || e.key === ' ') {
      jumpToCursor();
      cursorDetached = false;     // commit → cursor vanishes, playhead returns to full strength
      positionCursor();
      e.preventDefault(); return;
    }
    else return;
    if (delta) { cursorDetached = true; cursorMonth = clampMonth(cursorMonth + delta); }
    positionCursor();
    e.preventDefault();
  });

  // ── Playhead follows scroll ────────────────────────────────────────
  let activeFrac = parseFloat(sections[0].dataset.frac);
  let activeLabel = sections[0].dataset.label;
  function setPlayheadPos() {
    const p = axisPos(activeFrac);
    if (isPortrait) playhead.style.top = `${p}%`; else playhead.style.left = `${p}%`;
    phLabel.textContent = activeLabel;
    const am = Math.min(totalMonths - 1, Math.floor(activeFrac * totalMonths));
    bars.forEach(b => b.el.classList.toggle('active', b.month === am && counts[b.month] > 0));
    syncCursorToPlayhead();      // when attached, the cursor rides along (and stays hidden)
  }
  function updatePlayhead() {
    const line = window.innerHeight * 0.35;
    let active = sections[0];
    for (const s of sections) if (s.getBoundingClientRect().top <= line) active = s;
    activeFrac = parseFloat(active.dataset.frac);
    activeLabel = active.dataset.label;
    tlMiniDate.textContent = activeLabel;   // keep the collapsed pill's date live
    setPlayheadPos();
  }
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return; ticking = true;
    requestAnimationFrame(() => { updatePlayhead(); ticking = false; });
  }, { passive: true });

  // ── Click / hover the track to jump ────────────────────────────────
  function fracFromEvent(e) {
    const r = track.getBoundingClientRect();
    const f = isPortrait ? (e.clientY - r.top) / r.height : (e.clientX - r.left) / r.width;
    const clamped = Math.min(1, Math.max(0, f));
    return isPortrait ? 1 - clamped : clamped;   // invert: top = newest in portrait
  }
  track.addEventListener('mousemove', e => {
    const f = fracFromEvent(e);
    const d = new Date(spanStart + f * (spanEnd - spanStart));
    hoverFlag.textContent = fmtMonth(d);
    // set BOTH axes every time so stale props from the other orientation
    // can't survive a landscape⇄portrait switch (the bug: only some were set)
    // offset the chip OFF the pointer: above it (landscape) / left of it (portrait)
    // so it never blocks the spot you're aiming at. (`100%` = the track's far edge.)
    if (isPortrait) {
      hoverFlag.style.cssText = `top:${axisPos(f)}%;bottom:auto;right:calc(100% + 12px);left:auto;transform:translateY(-50%);`;
    } else {
      hoverFlag.style.cssText = `left:${axisPos(f)}%;right:auto;bottom:calc(100% + 12px);top:auto;transform:translateX(-50%);`;
    }
  });
  track.addEventListener('click', e => {
    const f = fracFromEvent(e);
    let nearest = sections[0], best = Infinity;
    for (const s of sections) { const d = Math.abs(parseFloat(s.dataset.frac) - f); if (d < best) { best = d; nearest = s; } }
    nearest.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // ── Minimize / expand ──────────────────────────────────────────────
  // anchor the pill's right edge to the (centered) bar's right edge so its
  // expand chevron lands exactly where the minimize toggle was
  function positionMini() {
    if (isPortrait) { tlMini.style.right = '14px'; return; }
    const w = Math.min(window.innerWidth - 96, 1080);
    tlMini.style.right = `${(window.innerWidth - w) / 2}px`;
  }
  tlToggle.addEventListener('click', () => { positionMini(); document.body.classList.add('tl-collapsed'); track.blur(); });
  tlMini.addEventListener('click', () => { document.body.classList.remove('tl-collapsed'); updatePlayhead(); });

  // init + respond to orientation changes
  track.setAttribute('aria-valuemin', 0);
  track.setAttribute('aria-valuemax', totalMonths - 1);
  window.addEventListener('resize', () => { layout(); positionMini(); });
  layout();
  updatePlayhead();
  positionMini();
</script>
</body>
</html>
